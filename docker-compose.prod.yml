version: '3.8'

# ============================================================
# API Pilot 生产部署配置
# 使用方式: docker compose -f docker-compose.prod.yml up -d
# 前提: 已配置好 .env 文件（含 SECRET_KEY / CORS 等）
# ============================================================

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: api-pilot-backend:latest
    container_name: api-pilot-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 5000 --workers 1 --no-server-header
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///data/api_pilot.db}
      - ENVIRONMENT=production
    volumes:
      # SQLite 数据持久化（如使用 PostgreSQL 可移除）
      - api_pilot_data:/app/backend/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    stop_grace_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-/api}
    image: api-pilot-frontend:latest
    container_name: api-pilot-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      # 如需配置 nginx，挂载自定义配置
      - ./frontend/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # SSL 证书（可选）
      - ./certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  api_pilot_data:
    driver: local
