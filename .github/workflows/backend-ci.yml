# ============================================================
# API Pilot 后端 CI
# 触发：推送到 main 或 PR 到 main
# ============================================================

name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-asyncio pytest-cov pip-audit
          pip install -r requirements.txt

      - name: Lint 检查（ruff）
        run: ruff check app/ tests/

      - name: 依赖安全审计（pip-audit）
        run: pip-audit -r requirements.txt
        continue-on-error: true

      - name: 运行测试（含覆盖率）
        run: |
          pytest tests/ -v --cov=app --cov-report=term --cov-report=xml --timeout=30 -q
        env:
          API_PILOT_SECRET_KEY: ci-test-secret-key
          DATABASE_URL: sqlite+aiosqlite:///./data/api_pilot_test.db

      - name: 上传覆盖率报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage.xml
